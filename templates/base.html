<!DOCTYPE html>
<html>
  <head>
    <title>Zion Johnson Portfolio</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">
    {% block head %}{% endblock %}
    <style>
      body {
        background-color: #0d1117 !important;
        min-height: 100vh;
        overflow-x: hidden;
      }

      #bg-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        pointer-events: none;
      }

      nav, section, .container, .container-fluid, footer {
        position: relative;
        z-index: 1;
      }

      .navbar {
        background: rgba(13, 17, 23, 0.75) !important;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.07);
      }

      .glass-card {
        background: rgba(255, 255, 255, 0.04);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border: 1px solid rgba(255, 255, 255, 0.09);
        border-radius: 14px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
      }

      .glass-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5);
        border-color: rgba(99, 179, 237, 0.25);
      }

      .glass-card .card-title,
      .glass-card .card-text,
      .glass-card h5,
      .glass-card h6,
      .glass-card p {
        color: #e2e8f0 !important;
      }
    </style>
  </head>
  <body>
    <canvas id="bg-canvas"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js" integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN" crossorigin="anonymous"></script>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a href="/" class="navbar-brand text-light">Zion C Johnson</a>
            <div class="collaspe navbar-collaspe" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link text-light" href="/">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-light" href="/skills">Skills</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-light" href="/projects">Projects</a>
                    </li>
                </ul>
            </div>
        </div>
      </nav>
    {% block body %}{% endblock %}

    <script>
      const canvas = document.getElementById('bg-canvas');
      const ctx = canvas.getContext('2d');

      let W, H, particles;

      const PARTICLE_COUNT = 80;
      const MAX_DIST = 140;
      const SPEED = 0.3;

      function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }

      function randBetween(a, b) {
        return a + Math.random() * (b - a);
      }

      function initParticles() {
        particles = Array.from({ length: PARTICLE_COUNT }, () => ({
          x: Math.random() * W,
          y: Math.random() * H,
          vx: randBetween(-SPEED, SPEED),
          vy: randBetween(-SPEED, SPEED),
          r: randBetween(1, 2.2),
        }));
      }

      function draw() {
        ctx.clearRect(0, 0, W, H);

        for (let i = 0; i < particles.length; i++) {
          const p = particles[i];

          p.x += p.vx;
          p.y += p.vy;

          if (p.x < 0) p.x = W;
          if (p.x > W) p.x = 0;
          if (p.y < 0) p.y = H;
          if (p.y > H) p.y = 0;

          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(99, 179, 237, 0.55)';
          ctx.fill();

          for (let j = i + 1; j < particles.length; j++) {
            const q = particles[j];
            const dx = p.x - q.x;
            const dy = p.y - q.y;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < MAX_DIST) {
              const alpha = (1 - dist / MAX_DIST) * 0.18;
              ctx.beginPath();
              ctx.moveTo(p.x, p.y);
              ctx.lineTo(q.x, q.y);
              ctx.strokeStyle = `rgba(99, 179, 237, ${alpha})`;
              ctx.lineWidth = 0.8;
              ctx.stroke();
            }
          }
        }

        requestAnimationFrame(draw);
      }

      window.addEventListener('resize', () => { resize(); initParticles(); });
      resize();
      initParticles();
      draw();
    </script>
  </body>
</html>
